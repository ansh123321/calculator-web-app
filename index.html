<!DOCTYPE html>
<html>
    <head>
        <title>Calculator</title>

        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="calculator">
            <button onclick="toggleHistory()" class="history-btn">📜 History</button>
            <div class="history" id="history"></div>
            <input type="text" id="display" value="0" disabled>

            <div class="buttons">
            
            <button class="top" onclick="clearDisplay()">C</button>
            <button class="top" onclick="appendValue('/')">/</button>
            <button class="top" onclick="appendValue('*')">*</button>
            <button class="top" onclick="deleteLast()">⌫</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('-')">-</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('+')">+</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="operator" onclick="calculate()">=</button>

            <button class="zero" onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>

            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
